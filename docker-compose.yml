version: '3.8'

services:
  # Backend API (FastAPI + Uvicorn)
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: aetherai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./aetherai.db:/app/aetherai.db
    environment:
      - DATABASE_URL=sqlite:///./aetherai.db
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    env_file:
      - .env
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  # Frontend (React - Teammate C will build this)
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: aetherai-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:8000
    command: npm start
    restart: unless-stopped
    depends_on:
      - backend
