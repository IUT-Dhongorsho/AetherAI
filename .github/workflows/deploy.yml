name: AetherAI CI/CD Pipeline

on:
  push:
    branches: [ "production" ]
  pull_request:
    branches: [ "production" ]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Stop spamming if previous runs are still in progress
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ========================================
  # JOB 1: Lint & Test BACKEND (Critical)
  # ========================================
  backend-checks:
    name: 🐍 Backend (Lint + Test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install backend dependencies
        run: |
          # Install core dependencies
          pip install --upgrade pip
          pip install -r requirements.txt
          # Install dev dependencies for testing/linting
          pip install flake8 pytest pytest-cov

      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings (won't fail the build)
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true  # Don't spam emails for style issues, just warn

      - name: Test with pytest (if tests exist)
        run: |
          # Run tests only if the tests folder exists
          if [ -d "backend/tests" ] || [ -d "backend/core/agents/*/tests" ]; then
            pytest backend/ -v --tb=short --maxfail=1
          else
            echo "⚠️ No tests found. Skipping pytest."
          fi
        continue-on-error: false  # Fail if tests exist but fail

      - name: Test Health Endpoint (Smoke Test)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          # Start the backend server in the background
          uvicorn backend.main:app --host 127.0.0.1 --port 8000 &
          PID=$!
          
          # Wait for the server to start (polling)
          for i in {1..15}; do
            RESPONSE=$(curl -s http://127.0.0.1:8000/health || true)
            if echo "$RESPONSE" | grep -q '"status":"healthy"'; then
              echo "✅ Health check passed!"
              kill $PID
              exit 0
            fi
            echo "Waiting for server to start..."
            sleep 2
          done
          
          echo "❌ Health check failed or server did not start in time."
          kill $PID
          exit 1

  # ========================================
  # JOB 2: FRONTEND (Optional - Skipped until React is ready)
  # ========================================
  frontend-checks:
    name: ⚛️ Frontend (Skip until package.json exists)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # This job runs, but immediately succeeds without doing anything
    # to avoid the "Job failed" spam emails.
    steps:
      - name: Check if frontend exists
        id: check_frontend
        run: |
          if [ -f "frontend/web/package.json" ]; then
            echo "frontend_exists=true" >> $GITHUB_OUTPUT
          else
            echo "frontend_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Skip frontend build (no package.json yet)
        if: steps.check_frontend.outputs.frontend_exists == 'false'
        run: echo "⏳ Frontend not ready. Skipping build. (No spam!)"

      - name: Setup Bun
        if: steps.check_frontend.outputs.frontend_exists == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build frontend (Only when ready)
        if: steps.check_frontend.outputs.frontend_exists == 'true'
        run: |
          cd frontend/web
          bun install
          bun run build
        continue-on-error: true  # Never fail the entire pipeline for frontend errors

  # ========================================
  # JOB 3: Deploy to Hugging Face / Render
  # ========================================
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-checks]  # Only deploy if backend passes
    if: github.ref == 'refs/heads/production' && success()
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies for deployment
        run: pip install -r requirements.txt

      # Option A: Deploy to Hugging Face Spaces (Gradio)
      # (Uncomment if using HF Spaces)
      # - name: Deploy to Hugging Face Spaces
      #   uses: huggingface/hub-actions@v1
      #   with:
      #     token: ${{ secrets.HF_TOKEN }}
      #     repo: aetherai/aetherai-space
      #     path: .
      #     type: gradio

      # Option B: Deploy to Render (using webhook)
      - name: Trigger Render Deploy
        if: secrets.RENDER_DEPLOY_HOOK_URL != ''
        run: |
          curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

      # Fallback: Just tell us it's ready
      - name: Deployment Summary
        run: |
          echo "✅ Backend checks passed! Ready to deploy."
          echo "📦 To deploy manually:"
          echo "   - HuggingFace: git push to hf-space"
          echo "   - Render: Trigger webhook in dashboard"